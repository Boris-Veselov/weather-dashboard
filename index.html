<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Weather Dashboard</title>
</head>

<body>

    <!-- storm background -->
    <div class="weather-bg">
      <div class="weather-strip">
        <div class="w-panel p1"></div>
        <div class="w-panel p2"></div>
        <div class="w-panel p3"></div>
        <div class="w-panel p4"></div>
        <div class="w-panel p5"></div>
        <div class="w-panel p6"></div>
        <div class="w-panel p1"></div>
        <div class="w-panel p2"></div>
        <div class="w-panel p3"></div>
        <div class="w-panel p4"></div>
        <div class="w-panel p5"></div>
        <div class="w-panel p6"></div>
      </div>
      <canvas id="rainCanvas"></canvas>
    </div>

    <!-- header -->
    <header>
        <h1>Weather Dashboard</h1>
    </header>

    <!-- main -->
    <main>

        <!-- search section (centered top) -->
        <div class="search-section">
            <form id="search-form">
                <h4>Search for a City</h4>
                <div class="input-wrapper">
                    <input id="city" type="text" class="form-input" placeholder="City, zip, or city + state…" autofocus="true" autocomplete="off"/>
                    <ul id="autocomplete-list"></ul>
                </div>
                <button class="btn" type="submit">Search</button>
            </form>
            <div class="past-search" id="search-buttons"></div>
        </div>

        <!-- results (appear below search) -->
        <div class="results-section">
            <div id="current-forecast">
                <h2 id="searched"></h2>
                <div id="weather-container" class="list-group"></div>
            </div>

            <div id="five-day-forecast">
                <h2 id="weather-forecast"></h2>
                <div class="forecast-cards" id="fiveday"></div>
            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.27.0/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="./assets/js/script.js"></script>
    <script src="./assets/js/weather-fx.js"></script>
</body>
</html>
